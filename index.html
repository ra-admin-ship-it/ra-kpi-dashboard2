<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RA KPI ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F172A;--bg2:#1E293B;--card:rgba(30,41,59,0.75);--card2:rgba(15,23,42,0.6);
  --border:rgba(148,163,184,0.12);--border2:rgba(148,163,184,0.25);
  --t1:#F1F5F9;--t2:#94A3B8;--t3:#64748B;
  --blue:#3B82F6;--blue2:#60A5FA;--indigo:#6366F1;--purple:#8B5CF6;
  --green:#10B981;--green2:#34D399;
  --yellow:#F59E0B;--yellow2:#FCD34D;
  --red:#EF4444;--red2:#F87171;
  --amber:#F59E0B;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --ease:cubic-bezier(0.4,0,0.2,1);
}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 0%,rgba(59,130,246,0.12) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 5%,rgba(99,102,241,0.09) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(139,92,246,0.06) 0%,transparent 50%);
  background-attachment:fixed;color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
.hdr{background:rgba(15,23,42,0.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);
  padding:0 24px;position:sticky;top:0;z-index:200}
.hdr-in{max-width:1600px;margin:0 auto;height:62px;display:flex;align-items:center;gap:14px}
.logo-box{width:36px;height:36px;border-radius:var(--r-sm);
  background:linear-gradient(135deg,var(--blue),var(--indigo));
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-box svg{width:20px;height:20px;color:#fff;stroke:currentColor}
.hdr-title{font-size:17px;font-weight:700;
  background:linear-gradient(135deg,#F1F5F9 30%,#94A3B8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-size:11px;color:var(--t3);font-weight:400}
.hdr-space{flex:1}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(59,130,246,0.15);color:var(--blue2);border:1px solid rgba(59,130,246,0.2)}
.hdr-date{font-size:12px;color:var(--t3)}

/* NAV */
.nav{background:rgba(15,23,42,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 24px;position:sticky;top:62px;z-index:199}
.nav-in{max-width:1600px;margin:0 auto;display:flex;gap:2px}
.tab-btn{padding:14px 18px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;
  border:none;background:none;position:relative;transition:color 0.2s var(--ease);
  font-family:inherit;white-space:nowrap}
.tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--indigo));
  opacity:0;transition:opacity 0.2s var(--ease);border-radius:2px 2px 0 0}
.tab-btn:hover{color:var(--t1)}
.tab-btn.active{color:var(--blue2)}
.tab-btn.active::after{opacity:1}

/* MAIN */
.main{padding:24px}
.inner{max-width:1600px;margin:0 auto;display:flex;flex-direction:column;gap:22px}
.panel{display:none;flex-direction:column;gap:22px}
.panel.on{display:flex}

/* CONTROLS */
.ctrl-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-grp{display:flex;align-items:center;gap:6px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r-md);padding:6px 12px}
.ctrl-lbl{font-size:11px;color:var(--t3);white-space:nowrap}
.ctrl-val{font-size:13px;font-weight:600;color:var(--t1);min-width:110px;text-align:center}
.ctrl-btn{background:none;border:none;color:var(--t2);cursor:pointer;padding:4px;
  border-radius:4px;transition:all 0.15s;display:flex;align-items:center}
.ctrl-btn:hover{background:var(--border2);color:var(--t1)}
.ctrl-note{font-size:11px;color:var(--t3)}

/* SUMMARY GRID */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px 20px;position:relative;overflow:hidden;
  transition:transform 0.2s var(--ease),box-shadow 0.2s var(--ease),border-color 0.2s}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--indigo))}
.sum-card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4);border-color:var(--border2)}
.sum-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.sum-val{font-size:26px;font-weight:700;color:var(--t1);margin:4px 0 8px;line-height:1.1;
  font-variant-numeric:tabular-nums}
.sum-sub{font-size:11px;color:var(--t2)}

/* SECTION CARD */
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden}
.sec-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px}
.sec-icon{width:30px;height:30px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ic-blue{background:rgba(59,130,246,0.15)}
.ic-purple{background:rgba(139,92,246,0.15)}
.ic-amber{background:rgba(245,158,11,0.15)}
.ic-green{background:rgba(16,185,129,0.15)}
.sec-title{font-size:14px;font-weight:700}
.sec-sub{font-size:11px;color:var(--t2);margin-top:1px}
.sec-body{padding:18px 22px}
.sec-body-flush{overflow-x:auto}

/* DATA TABLE */
.dt{width:100%;border-collapse:collapse}
.dt th{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;
  padding:8px 14px;text-align:center;background:rgba(0,0,0,0.25);white-space:nowrap}
.dt th:first-child{text-align:left;min-width:60px}
.dt td{padding:10px 14px;text-align:center;font-size:13px;
  border-bottom:1px solid var(--border);vertical-align:middle}
.dt td:first-child{text-align:left;font-weight:600;white-space:nowrap}
.dt tbody tr:last-child td{border-bottom:none}
.dt tbody tr:hover{background:rgba(255,255,255,0.015)}
.team-row{background:rgba(59,130,246,0.06)!important}
.team-row td{color:var(--blue2)!important;font-weight:700!important}

/* PROGRESS BAR */
.pb-wrap{display:flex;flex-direction:column;gap:3px;min-width:130px}
.pb-info{display:flex;justify-content:space-between;align-items:baseline;font-size:11px}
.pb-actual{font-weight:700;color:var(--t1);font-variant-numeric:tabular-nums}
.pb-rate{font-weight:600}
.pb-track{height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.fill-green{background:linear-gradient(90deg,var(--green),var(--green2))}
.fill-yellow{background:linear-gradient(90deg,var(--yellow),var(--yellow2))}
.fill-red{background:linear-gradient(90deg,var(--red),var(--red2))}
.fill-blue{background:linear-gradient(90deg,var(--blue),var(--blue2))}
.pb-tgt{font-size:10px;color:var(--t3)}
.c-green{color:var(--green)}
.c-yellow{color:var(--yellow)}
.c-red{color:var(--red)}
.c-blue{color:var(--blue2)}

/* PIPELINE FUNNEL */
.funnel{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px}
.funnel-step{text-align:center;padding:14px 10px;
  background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:var(--r-md);
  transition:transform 0.2s,border-color 0.2s}
.funnel-step:hover{transform:translateY(-2px);border-color:var(--border2)}
.funnel-name{font-size:10px;color:var(--t3);margin-bottom:6px}
.funnel-val{font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums}
.funnel-tgt{font-size:10px;color:var(--t3);margin-bottom:6px}
.funnel-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.funnel-pct{font-size:10px;margin-top:4px;color:var(--t3)}

/* KGI */
.kgi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.kgi-card{background:rgba(0,0,0,0.22);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:18px;transition:border-color 0.2s}
.kgi-card:hover{border-color:var(--border2)}
.kgi-member{font-size:15px;font-weight:700;margin-bottom:14px}
.kgi-lbl{font-size:10px;color:var(--t3);margin-bottom:3px}
.kgi-row{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.kgi-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.kgi-tgt{font-size:10px;color:var(--t3)}
.kgi-metric{margin-bottom:12px}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:10px;margin:4px 0 14px}
.div-line{flex:1;height:1px;background:var(--border)}
.div-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:16px}
.chart-wrap{position:relative;height:280px}
.rate-badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(59,130,246,0.15);color:var(--blue2)}
/* P1 手動編集ボタン */
.p1-edit{display:flex;align-items:center;gap:4px}
.p1-edit .pb-wrap{flex:1}
.p1-adj{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);background:none;
  color:var(--t2);cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;
  justify-content:center;transition:all .15s;flex-shrink:0;font-family:inherit;line-height:1}
.p1-adj:hover{background:var(--border2);color:var(--t1)}
.p1-adj:active{transform:scale(0.9)}

/* LEADS TAB */
.leads-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.leads-filter{padding:6px 12px;border-radius:var(--r-md);border:1px solid var(--border);
  background:var(--card);color:var(--t1);font-size:12px;font-family:inherit;cursor:pointer}
.leads-filter option{background:var(--bg2)}
.leads-btn{padding:6px 14px;border-radius:var(--r-md);border:1px solid var(--border2);
  background:none;color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.leads-btn:hover{background:var(--border2);color:var(--t1)}
.leads-btn-primary{background:rgba(59,130,246,0.15);color:var(--blue2);border-color:rgba(59,130,246,0.3)}
.leads-btn-primary:hover{background:rgba(59,130,246,0.3)}
.leads-tbl{width:100%;border-collapse:collapse;font-size:12px}
.leads-tbl th{text-align:left;padding:8px 10px;color:var(--t3);font-weight:600;font-size:11px;
  text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg2);white-space:nowrap}
.leads-tbl td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.leads-tbl tr:hover{background:rgba(255,255,255,0.03)}
.leads-tbl .leads-co{font-weight:600;color:var(--t1);min-width:140px}
.leads-tbl .leads-rep{color:var(--t2);white-space:nowrap}
.leads-status-sel{padding:3px 6px;border-radius:6px;border:1px solid var(--border);
  background:var(--card);color:var(--t1);font-size:11px;font-family:inherit;cursor:pointer;
  max-width:160px}
.leads-status-sel option{background:var(--bg2)}
.leads-editable{background:none;border:1px solid transparent;border-radius:4px;color:var(--t1);
  font-size:12px;padding:2px 4px;font-family:inherit;width:100%;transition:border-color .15s}
.leads-editable:hover{border-color:var(--border2)}
.leads-editable:focus{border-color:var(--blue);outline:none;background:var(--card)}
.leads-date{width:90px}
.leads-svc{display:flex;flex-wrap:wrap;gap:2px}
.leads-svc-tag{padding:1px 5px;border-radius:4px;font-size:10px;
  background:rgba(99,102,241,0.15);color:var(--indigo)}
.leads-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;
  padding:2px 6px;border-radius:4px;transition:all .15s}
.leads-del:hover{color:var(--red);background:rgba(239,68,68,0.1)}
.leads-scroll{max-height:70vh;overflow-y:auto;border-radius:var(--r-lg)}
.leads-save-indicator{font-size:11px;color:var(--green2);opacity:0;transition:opacity .3s}
.leads-save-indicator.show{opacity:1}
.st-done{color:var(--green2)}.st-progress{color:var(--blue2)}.st-wait{color:var(--yellow2)}
.st-hold{color:var(--t3)}
.leads-pat-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);
  z-index:300;display:flex;align-items:center;justify-content:center}
.leads-pat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:28px;max-width:480px;width:90%}
.leads-pat-box h3{margin-bottom:12px;font-size:15px}
.leads-pat-box input{width:100%;padding:8px 12px;border-radius:var(--r-md);border:1px solid var(--border2);
  background:var(--card);color:var(--t1);font-size:13px;font-family:inherit;margin:8px 0 16px}
.leads-pat-box .btn-row{display:flex;gap:8px;justify-content:flex-end}
.leads-count{font-size:11px;color:var(--t3);margin-left:auto}
.leads-co-link{color:var(--blue2);cursor:pointer;text-decoration:none;font-weight:600}
.leads-co-link:hover{text-decoration:underline}
.leads-excl{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);cursor:pointer;user-select:none}
.leads-excl input{accent-color:var(--blue)}
/* Detail Modal */
.ld-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);
  z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.ld-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);
  width:100%;max-width:720px;padding:0;animation:ldIn .2s ease}
@keyframes ldIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.ld-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.ld-header h2{font-size:16px;font-weight:700;color:var(--t1);flex:1}
.ld-close{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:4px 8px;
  border-radius:var(--r-sm);transition:all .15s}
.ld-close:hover{background:var(--border2);color:var(--t1)}
.ld-info{padding:16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ld-field{display:flex;flex-direction:column;gap:3px}
.ld-field-lbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.ld-field input,.ld-field select,.ld-field textarea{padding:6px 10px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--card);color:var(--t1);font-size:12px;font-family:inherit}
.ld-field textarea{resize:vertical;min-height:48px}
.ld-field-full{grid-column:1/-1}
.ld-sep{border:none;border-top:1px solid var(--border);margin:0}
.ld-svc-header{padding:14px 24px 8px;display:flex;align-items:center;gap:10px}
.ld-svc-header h3{font-size:13px;font-weight:600;color:var(--t2);flex:1}
.ld-svc-list{padding:0 24px 16px;display:flex;flex-direction:column;gap:10px}
.ld-svc-card{border:1px solid var(--border);border-radius:var(--r-md);padding:14px;position:relative}
.ld-svc-card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ld-svc-card-name{font-size:13px;font-weight:600;color:var(--indigo);flex:1}
.ld-svc-card-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;
  padding:2px 6px;border-radius:4px}.ld-svc-card-del:hover{color:var(--red)}
.ld-svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ld-svc-grid .ld-field-full{grid-column:1/-1}
.ld-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.ld-svc-add-row{padding:0 24px 16px;display:flex;gap:6px;flex-wrap:wrap}
.ld-svc-add-btn{padding:4px 10px;border-radius:var(--r-sm);border:1px dashed var(--border2);
  background:none;color:var(--t3);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.ld-svc-add-btn:hover{border-color:var(--blue);color:var(--blue2);background:rgba(59,130,246,0.05)}

/* NUMBER */
.num{font-variant-numeric:tabular-nums}

/* ── CSV DROP ZONE ─────────────────────────────────────────── */
.csv-drop-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;
  border:1px dashed var(--border2);border-radius:var(--r-md);cursor:pointer;
  transition:all 0.2s var(--ease);background:rgba(59,130,246,0.04);
  font-size:11px;font-weight:500;color:var(--t2);white-space:nowrap;flex-shrink:0;
  font-family:inherit;user-select:none}
.csv-drop-btn:hover,.csv-drop-btn.over{border-color:var(--blue);
  background:rgba(59,130,246,0.12);color:var(--blue2)}
.csv-drop-btn svg{width:12px;height:12px;flex-shrink:0;stroke:currentColor}
.csv-drop-btn.has-data{border-color:rgba(16,185,129,0.45);
  background:rgba(16,185,129,0.08);color:var(--green)}

/* ── MEDIA SECTION HEADING ──────────────────────────────────── */
.media-heading{
  display:flex;align-items:center;gap:7px;
  padding:18px 22px 4px;
  font-size:12px;font-weight:600;letter-spacing:.04em;
  color:var(--t2);border-top:1px solid var(--border);
  text-transform:uppercase;
}
/* ── HISTORY BAR ────────────────────────────────────────────── */
.mhist-bar{
  display:flex;align-items:center;gap:6px;
  padding:8px 22px 4px;overflow-x:auto;
  scrollbar-width:none;
}
.mhist-bar::-webkit-scrollbar{display:none}
.mhist-label{
  font-size:10px;color:var(--t3);white-space:nowrap;
  padding-right:4px;flex-shrink:0;
}
.mhist-pill{
  display:flex;align-items:center;gap:2px;
  padding:3px 8px 3px 10px;border-radius:20px;
  border:1px solid var(--border);background:var(--card2);
  font-size:11px;color:var(--t2);white-space:nowrap;
  flex-shrink:0;transition:border-color .15s,background .15s;
}
.mhist-pill span{cursor:pointer;}
.mhist-pill:hover{border-color:var(--blue1);}
.mhist-pill.active{
  background:rgba(59,130,246,0.15);
  border-color:var(--blue1);color:var(--blue2);font-weight:600;
}
.mhist-del{
  background:none;border:none;color:var(--t3);
  font-size:12px;cursor:pointer;padding:0 0 0 4px;line-height:1;
  opacity:.5;transition:opacity .15s;
}
.mhist-del:hover{opacity:1;color:#ef4444;}
/* ── MEDIA TABS ─────────────────────────────────────────────── */
.mtab-bar{display:flex;align-items:flex-end;gap:3px;
  padding:8px 22px 0;}
.mtab-btn{padding:6px 13px;font-size:12px;font-weight:500;color:var(--t2);
  cursor:pointer;border:1px solid var(--border);
  border-radius:var(--r-sm) var(--r-sm) 0 0;border-bottom:none;
  background:none;font-family:inherit;transition:all 0.15s;white-space:nowrap}
.mtab-btn:hover{color:var(--t1);border-color:var(--border2)}
.mtab-btn.active{background:var(--bg2);color:var(--blue2);
  border-color:rgba(59,130,246,0.4);position:relative;z-index:1}
.mtab-actions{margin-left:auto;display:flex;align-items:center;gap:8px;padding-bottom:2px}

      if (!res.ok) throw new Error("HTTP " + res.status);
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      return mergeGASData(d);
    } catch(e) {
      console.warn("[GAS] fetch failed:", e.message);
    }
  }

  // 2. GitHub Raw data.json（タイムスタンプでキャッシュ無効化 → push後即時反映）
  try {
    const rawUrl = "https://raw.githubusercontent.com/ra-admin-ship-it/ra-kpi-dashboard2/main/data.json?_=" + Date.now();
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const d = await res.json();
    console.info("[data.json] loaded from GitHub raw");
    return mergeFullData(d);
  } catch(e) {
    console.info("[data.json] not available, using SAMPLE_DATA:", e.message);
  }

  // 3. フォールバック
  return SAMPLE_DATA;
}

/**
 * GAS から返った AZ 集計データを SAMPLE_DATA にマージして返す。
 * - GAS が持つのは AZ データのみ（p2.AZ）
 * - p1（商談・契約等）/ selection / targets / kgi は SAMPLE_DATA を使用
 * - GAS データが存在する月・週の AZ 値は GAS データで上書き
 *
 * @param {Object} gasData  { az: { "YYYY-MM": { week: { member: n } } }, lastUpdated, ... }
 * @return {Object} マージ済みデータ
 */
function mergeGASData(gasData) {
  // SAMPLE_DATA を深コピーしてベースとして使用
  const base = JSON.parse(JSON.stringify(SAMPLE_DATA));

  if (!gasData || !gasData.az) return base;

  const emptyP1 = () => ({
    フォーム送信数: Object.fromEntries(MEMBERS.map(m => [m, 0])),
    返信数:        Object.fromEntries(MEMBERS.map(m => [m, 0])),
    アポイント数:   Object.fromEntries(MEMBERS.map(m => [m, 0])),
    商談数:        Object.fromEntries(MEMBERS.map(m => [m, 0])),
    契約締結数:    Object.fromEntries(MEMBERS.map(m => [m, 0])),
  });

  Object.entries(gasData.az).forEach(([ym, weeklyAZ]) => {
    // 月がまだ SAMPLE_DATA にない場合は新規作成
    if (!base[ym]) {
      base[ym] = {
        weeks:     {},
        selection: {},
        targets:   { p1: {}, p2: { AZ: Object.fromEntries(MEMBERS.map(m=>[m,0])) } },
        kgi:       Object.fromEntries(MEMBERS.map(m => [m, { 粗利実績:0, 粗利目標:0, 売上実績:0 }])),
      };
    }

    Object.entries(weeklyAZ).forEach(([week, azByMember]) => {
      const wNum = parseInt(week, 10);
      // 週がまだない場合は空データで初期化
      if (!base[ym].weeks[wNum]) {
        base[ym].weeks[wNum] = { p1: emptyP1(), p2: { AZ: {} } };
      }
      // AZ データを GAS の値で上書き（MEMBERS 以外のキーは無視）
      const filtered = {};
      MEMBERS.forEach(m => { filtered[m] = azByMember[m] || 0; });
      base[ym].weeks[wNum].p2.AZ = filtered;
    });
  });

  // ヘッダーの最終更新日時を更新
  if (gasData.lastUpdated) {
    const d = new Date(gasData.lastUpdated);
    const label = d.toLocaleString("ja-JP", { timeZone: "Asia/Tokyo",
      year:"numeric", month:"2-digit", day:"2-digit",
      hour:"2-digit", minute:"2-digit" });
    const el = document.getElementById("hdr-date");
    if (el) el.textContent = "GAS 最終更新: " + label;
  }

  return base;
}

/**
 * data.json（フル構造）を SAMPLE_DATA にマージして返す。
 * 1. 旧 "az" キー形式（GAS 互換）を mergeGASData で先に適用
 * 2. 新 "YYYY-MM" キー形式を上書き適用（優先）
 */
function mergeFullData(d) {
  // 旧 az キー形式を先に適用（後方互換: GAS 由来の AZ データを保持）
  const base = mergeGASData(d);
  for (const [ym, mData] of Object.entries(d)) {
    if (!/^\d{4}-\d{2}$/.test(ym)) continue;
    if (!base[ym]) {
      base[ym] = { weeks: {}, selection: {}, targets: { p1: {}, p2: {} }, kgi: {} };
    }
    const rm = base[ym];
    if (mData.weeks) {
      rm.weeks = rm.weeks || {};
      for (const [wn, wData] of Object.entries(mData.weeks)) {
        const wnInt = parseInt(wn, 10);
        if (!rm.weeks[wnInt]) rm.weeks[wnInt] = { p1: {}, p2: {} };
        if (wData.p1) Object.assign(rm.weeks[wnInt].p1, wData.p1);
        if (wData.p2) Object.assign(rm.weeks[wnInt].p2, wData.p2);
      }
    }
    if (mData.selection) {
      rm.selection = rm.selection || {};
      // フィールドごとに深くマージ（SAMPLE_DATA の target を保持しつつ actual を上書き）
      for (const [k, v] of Object.entries(mData.selection)) {
        rm.selection[k] = Object.assign({}, rm.selection[k] || {}, v);
      }
    }
    if (mData.kgi) {
      rm.kgi = rm.kgi || {};
      // メンバーごとに深くマージ（粗利目標など SAMPLE_DATA のキーを保持しつつ実績値を上書き）
      for (const [k, v] of Object.entries(mData.kgi)) {
        rm.kgi[k] = Object.assign({}, rm.kgi[k] || {}, v);
      }
    }
  }
  if (d.lastUpdated) {
    const dt = new Date(d.lastUpdated);
    const label = dt.toLocaleString("ja-JP", { timeZone: "Asia/Tokyo",
      year:"numeric", month:"2-digit", day:"2-digit",
      hour:"2-digit", minute:"2-digit" });
    setTimeout(() => {
      const el = document.getElementById("hdr-date");
      if (el) el.textContent = "最終更新: " + label;
    }, 0);
  }
  return base;
}

function adjustP1(member, field, delta) {
  const md = DATA[curMonth];
  if (!md) return;
  const wd = md.weeks[curWeek];
  if (!wd) {
    md.weeks[curWeek] = { p1: {}, p2: {} };
  }
  const p1 = md.weeks[curWeek].p1 = md.weeks[curWeek].p1 || {};
  p1[field] = p1[field] || {};
  p1[field][member] = Math.max(0, (p1[field][member] || 0) + delta);
  saveP1Overrides();
  redraw();
}

const P1_OVERRIDES_KEY = "ra_kpi_p1_overrides_v1";

function saveP1Overrides() {
  // DATA 内の全 p1 データを保存（月・週・フィールド・メンバー）
  const overrides = {};
  for (const [ym, md] of Object.entries(DATA)) {
    if (!/^\d{4}-\d{2}$/.test(ym)) continue;
    for (const [wn, wd] of Object.entries(md.weeks || {})) {
      if (!wd.p1) continue;
      for (const [field, members] of Object.entries(wd.p1)) {
        for (const [m, v] of Object.entries(members)) {
          const key = `${ym}_${wn}_${field}_${m}`;
          overrides[key] = v;
        }
      }
    }
  }
  try { localStorage.setItem(P1_OVERRIDES_KEY, JSON.stringify(overrides)); } catch(e) {}
}

function loadP1Overrides() {
  try {
    const raw = localStorage.getItem(P1_OVERRIDES_KEY);
    if (!raw) return;
    const overrides = JSON.parse(raw);
    for (const [key, val] of Object.entries(overrides)) {
      const [ym, wn, field, member] = key.split("_");
      if (!DATA[ym]) continue;
      const md = DATA[ym];
      md.weeks = md.weeks || {};
      md.weeks[wn] = md.weeks[wn] || { p1: {}, p2: {} };
      md.weeks[wn].p1 = md.weeks[wn].p1 || {};
      md.weeks[wn].p1[field] = md.weeks[wn].p1[field] || {};
      md.weeks[wn].p1[field][member] = val;
    }
  } catch(e) {}
}

const sum = (obj) => MEMBERS.reduce((s, m) => s + (obj?.[m] || 0), 0);

function rate(actual, target) {
  if (!target || target === 0) return actual > 0 ? 9999 : null;
  return actual / target * 100;
}

function color(r) {
  if (r === null) return "blue";
  if (r >= COLOR_THRESHOLD.yellow) return "green";
  if (r >= COLOR_THRESHOLD.red)    return "yellow";
  return "red";
}

function emoji(r) {
  const c = color(r);
  return c === "green" ? "🟢" : c === "yellow" ? "🟡" : c === "red" ? "🔴" : "⚪";
}

function fmtN(n) {
  if (n === null || n === undefined) return "—";
  return n.toLocaleString("ja-JP");
}

function fmtY(n) {
  if (n === null || n === undefined) return "—";
  if (n === 0) return "¥0";
  const sign = n < 0 ? "-¥" : "¥";
  return sign + Math.abs(Math.round(n)).toLocaleString("en-US");
}

function fmtPct(r) {
  if (r === null) return "—";
  if (r > 999) return "超過";
  return r.toFixed(0) + "%";
}

function clamp(r) { return r === null ? 0 : Math.min(100, r); }

function monthLabel(ym) {
  const [y, m] = ym.split("-");
  return `${y}年${parseInt(m)}月`;
}

// ── 週計算（最終金曜ルール）────────────────────────────────────
// 月の最終週 = 最後の金曜日を含む週（月〜日）
// その翌月曜から次月の第1週
function _lastFriday(y, m) {
  const last = new Date(y, m, 0).getDate();
  for (let d = last; d >= 1; d--) {
    if (new Date(y, m - 1, d).getDay() === 5) return new Date(y, m - 1, d);
  }
  return new Date(y, m - 1, last); // fallback
}
function _mondayOf(dt) {
  const d = new Date(dt);
  const day = d.getDay(); // 0=日
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}
// 指定月のKPI週リストを返す [{start:Date, end:Date}, ...]
function getMonthWeeks(ym) {
  const [y, m] = ym.split("-").map(Number);
  // この月の最終金曜の週末（日曜）= KPI月の終了
  const lf = _lastFriday(y, m);
  const lastSun = new Date(lf); lastSun.setDate(lf.getDate() + (7 - lf.getDay()) % 7);
  // 前月の最終金曜の週末（日曜）の翌日（月曜）= KPI月の開始
  const pm = m === 1 ? 12 : m - 1, py = m === 1 ? y - 1 : y;
  const plf = _lastFriday(py, pm);
  const plSun = new Date(plf); plSun.setDate(plf.getDate() + (7 - plf.getDay()) % 7);
  const firstMon = new Date(plSun); firstMon.setDate(firstMon.getDate() + 1);
  // 週リスト生成
  const weeks = [];
  const cur = new Date(firstMon);
  while (cur <= lastSun) {
    const end = new Date(cur); end.setDate(end.getDate() + 6);
    weeks.push({ start: new Date(cur), end: new Date(end) });
    cur.setDate(cur.getDate() + 7);
  }
  return weeks;
}
// 週番号 → 開始・終了日
function weekDateRange(ym, wn) {
  const weeks = getMonthWeeks(ym);
  if (wn < 1 || wn > weeks.length) return null;
  const w = weeks[wn - 1];
  return { startDate: w.start, endDate: w.end };
}
// "3/30〜4/5" 形式（月跨ぎ対応）
function weekRangeLabel(ym, wn) {
  const r = weekDateRange(ym, wn);
  if (!r) return "—";
  const sm = r.startDate.getMonth() + 1, sd = r.startDate.getDate();
  const em = r.endDate.getMonth() + 1, ed = r.endDate.getDate();
  return `${sm}/${sd}〜${em}/${ed}`;
}

// 月次データから指標を週合計
function cumul(monthData, metric, pipe) {
  const out = {};
  MEMBERS.forEach(m => out[m] = 0);
  Object.values(monthData.weeks).forEach(w => {
    MEMBERS.forEach(m => { out[m] += w[pipe]?.[metric]?.[m] || 0; });
  });
  return out;
}

// ── SVG 円形プログレスリング ─────────────────────────────────
// actual/target を中央にテキスト表示する SVG を返す
function circleRing(actual, target, accent, size) {
  size = size || 78;
  const cx = size / 2, cy = size / 2;
  const r   = size * 0.40;
  const sw  = size * 0.09;
  const circ = 2 * Math.PI * r;
  const pct  = target > 0 ? Math.min(actual / target, 1) : 0;
  const dash = pct * circ;
  const done = target > 0 && actual >= target;
  const fc   = done ? "#22c55e" : accent;
  const fs1  = Math.round(size * 0.22);
  const fs2  = Math.round(size * 0.13);
  const y1   = cy + size * 0.06;
  const y2   = cy + size * 0.22;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="${sw}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${fc}" stroke-width="${sw}"
      stroke-dasharray="${dash.toFixed(1)} ${Math.max(0,circ-dash).toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${y1}" text-anchor="middle" dominant-baseline="middle"
      fill="${done?'#22c55e':'#fff'}" font-size="${fs1}" font-weight="700"
      font-family="'Noto Sans JP',sans-serif">${actual}</text>
    ${target > 0 ? `<text x="${cx}" y="${y2}" text-anchor="middle" dominant-baseline="middle"
      fill="rgba(255,255,255,0.35)" font-size="${fs2}"
      font-family="'Noto Sans JP',sans-serif">/ ${target}</text>` : ''}
  </svg>`;
}

    </div>
    <div class="p1-footer-stats">
      <div class="p1-fstat"><span class="p1-fstat-lbl">目標</span><span class="p1-fstat-val">${teamTgt}件</span></div>
      <div class="p1-fstat"><span class="p1-fstat-lbl">達成率</span><span class="p1-fstat-val${tDone?' p1-done':''}">${fmtPct(tR)}</span></div>
      <div class="p1-fstat"><span class="p1-fstat-lbl">ビハインド</span><span class="p1-fstat-val">${tDone
        ? '<span class="achieve-tag">達成！</span>'
        : `<span class="behind-tag">-${tBeh}</span>`}</span></div>
    </div>
  </div>`;

  return `<div class="p1-grid" style="margin-bottom:8px">${memberCards}${teamCard}</div>`;
}

function kgiSection(kgi, period) {
  if (!kgi) return "";
  const teamGP  = MEMBERS.reduce((s,m) => s + (kgi[m]?.粗利実績 || 0), 0);
  const teamGPT = MEMBERS.reduce((s,m) => s + (kgi[m]?.粗利目標 || 0), 0);
  const teamRev = MEMBERS.reduce((s,m) => s + (kgi[m]?.売上実績 || 0), 0);
  const teamR   = rate(teamGP, teamGPT);

  function kgiCard(name, gp, gpt, rev, ac, isTeam) {
    const r      = rate(gp, gpt);
    const rNum   = r !== null ? r : 0;
    const behind = Math.max(0, gpt - gp);
    const done   = gpt > 0 && gp >= gpt;
    const gpM    = Math.round(gp / 10000);
    const gptM   = Math.round(gpt / 10000);
    const noTgt  = gpt === 0 || r === null;
    const badgeCls = noTgt ? 'neu' : done ? 'done' : rNum >= 80 ? 'ov' : '';
    const badgeTxt = noTgt ? '目標未設定' : done ? '達成' : fmtPct(r);
    return `<div class="kgip-card${isTeam?' kgip-team':''}" style="--mc:${ac}">
      <div class="kgip-glow"></div>
      <div class="kgip-header">
        <span class="kgip-name">${name}</span>
        <span class="kgip-badge ${badgeCls}">${badgeTxt}</span>
      </div>
      <div class="kgip-ring-area">
        ${circleRing(gpM, gptM, ac, 110)}
        <span class="kgip-ring-unit">万円</span>
      </div>
      <div class="kgip-sep"></div>
      <div class="kgip-stats2">
        <div class="kgip-stat2">
          <span class="kgip-stat2-lbl">粗利目標</span>
          <span class="kgip-stat2-val">${fmtY(gpt)}</span>
        </div>
        <div class="kgip-stat2">
          <span class="kgip-stat2-lbl">${isTeam ? '売上合計' : '売上実績'}</span>
          <span class="kgip-stat2-val">${fmtY(rev)}</span>
        </div>
      </div>
      <div class="kgip-bottom">
        <span class="kgip-bottom-lbl">ビハインド</span>
        ${done
          ? `<span class="kgip-bottom-done">✓ 達成</span>`
          : `<span class="kgip-bottom-behind">${fmtY(-behind)}</span>`
        }
      </div>
    </div>`;
  }

  const memberCards = MEMBERS.map(m => {
    const d  = kgi[m] || {};
    const ac = MEMBER_COLORS[m] || "#3B82F6";
    return kgiCard(m, d.粗利実績||0, d.粗利目標||0, d.売上実績||0, ac, false);
  }).join('');

  const teamCard = kgiCard("チーム合計", teamGP, teamGPT, teamRev, "#F59E0B", true);

  return `<div class="sec">
    <div class="sec-head">
      <div class="sec-icon ic-amber">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <div>
        <div class="sec-title">KGI 売上・粗利</div>
        <div class="sec-sub">${period}実績</div>
      </div>
    </div>
    <div class="kgip-grid">
      ${memberCards}${teamCard}
    </div>
  </div>`;
}

// ── 週ピッカー制御 ───────────────────────────────────────────
function toggleWeekPicker(e) {
  e.stopPropagation();
  const el = document.getElementById("week-picker-dd");
  if (!el) return;
  const opening = el.style.display === "none";
  el.style.display = opening ? "block" : "none";
  if (opening) {
    const close = ev => { if (!el.contains(ev.target)) el.style.display = "none"; };
    setTimeout(() => document.addEventListener("click", close, { once: true }), 0);
  }
}
function selectWeekPicker(wn) {
  const el = document.getElementById("week-picker-dd");
  if (el) el.style.display = "none";
  curWeek = wn;
  redraw();
}
function renderWeekPicker() {
  const md = DATA[curMonth];
  if (!md) return "";
  const weeks = Object.keys(md.weeks).map(Number).sort((a, b) => a - b);
  const items = weeks.map(wn => {
    const { m, start, end } = weekDateRange(curMonth, wn);
    const isActive = curWeek === wn;
    return `<div class="wpick-item${isActive ? ' active' : ''}" onclick="selectWeekPicker(${wn})">
      <span class="wpick-wn">第${wn}週</span>
      <span class="wpick-range">${m}/${start} 〜 ${m}/${end}</span>
      ${isActive ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--blue2)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
    </div>`;
  }).join('');
  return `<div id="week-picker-dd" class="wpick-drop" style="display:none">
    <div class="wpick-header">${monthLabel(curMonth)} — 週を選択</div>
    ${items}
  </div>`;
}

function controlBar(showWeek) {

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", ["weekly","monthly","weekly-hist","monthly-hist","applications","leads"][i] === tab);
  });
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("on"));
  document.getElementById(`panel-${tab}`)?.classList.add("on");
  redraw();
}

function redraw() {
  charts.forEach(c => c.destroy());
  charts = [];
  if (activeTab === "weekly")       renderWeekly();
  else if (activeTab === "monthly") renderMonthly();
  else if (activeTab === "weekly-hist")  renderWeeklyHist();
  else if (activeTab === "monthly-hist") renderMonthlyHist();
  else if (activeTab === "applications")  renderApplications();
  else if (activeTab === "leads")  renderLeads();
  // ヘッダーバッジ更新
  document.getElementById("hdr-month-badge").textContent = monthLabel(curMonth);
}

function prevMonth() {
  const months = Object.keys(DATA).sort();
  const i = months.indexOf(curMonth);
  if (i > 0) { curMonth = months[i-1]; redraw(); }
}
function nextMonth() {
  const months = Object.keys(DATA).sort();
  const i = months.indexOf(curMonth);
  if (i < months.length - 1) { curMonth = months[i+1]; redraw(); }
}
function prevWeek() {
  const md = DATA[curMonth];
  if (!md) return;
  const ws = Object.keys(md.weeks).map(Number).sort((a,b)=>a-b);
  const i = ws.indexOf(curWeek);
  if (i > 0) { curWeek = ws[i-1]; redraw(); }
}
function nextWeek() {
  const md = DATA[curMonth];
  if (!md) return;
  const ws = Object.keys(md.weeks).map(Number).sort((a,b)=>a-b);
  const i = ws.indexOf(curWeek);
  if (i < ws.length - 1) { curWeek = ws[i+1]; redraw(); }
}

// ═══════════════════════════════════════════════════════════════
// P1 CSV 取り込み機能
// ═══════════════════════════════════════════════════════════════

const P1CSV_HISTORY_KEY = "ra_kpi_p1csv_history_v1";

// 媒体セクション名（タブ表示順）
const MEDIA_SECTION_NAMES = ["全体", "GRIT", "つばめ", "SAKURA"];
// 各セクションのヘッダー行を識別する正規表現
const SECTION_HEADER_RE = {
  "全体":   /^全体$/,
  "GRIT":   /^GRIT/i,
  "つばめ": /^つばめ/,
  "SAKURA": /^SAKURA/i,
};

// 抽出対象の指標（CSVの0列目と一致させる）
const CSV_METRICS_KPI   = ["リスト送付数","対応数","送付完了数","送付完了率","アポ数","転換率"];
const CSV_METRICS_PLAIN = ["費用合計","商談獲得単価"];
const CSV_METRICS_ALL   = [...CSV_METRICS_KPI, ...CSV_METRICS_PLAIN];

let p1CSVHistory   = [];  // スナップショット配列（新しい順）
let activeHistoryIdx = 0; // 現在表示中のスナップショット index
let activeMediaTab = "全体";

// アクティブなスナップショットを返すヘルパー
function getActiveCSV() {
  return p1CSVHistory.length > 0 ? p1CSVHistory[activeHistoryIdx] : null;
}

// 期間キー（同週の重複アップを防ぐ dedup キー）
function csvPeriodKey(data) {
  const last = (data.weekLabels || []).slice(-1)[0] || "";
  return `${data.month || ""}_${last}`;
}

// スナップショット表示ラベル（"3/23〜3/29" など）
function csvSnapLabel(data) {
  return (data.weekLabels || []).slice(-1)[0] || new Date(data.uploadedAt).toLocaleDateString("ja-JP");
}

// ── localStorage ─────────────────────────────────────────────
function loadP1CSV() {
  try {
    const raw = localStorage.getItem(P1CSV_HISTORY_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      p1CSVHistory = parsed;
    } else if (parsed && parsed.sections) {
      // 旧フォーマット（単体オブジェクト）からの移行
      p1CSVHistory = [{ ...parsed, id: csvPeriodKey(parsed), label: csvSnapLabel(parsed) }];
    }
    activeHistoryIdx = 0;
  } catch(e) { console.warn("p1csv load failed", e); }
}

function saveP1CSV(data) {
  const id    = csvPeriodKey(data);
  const label = csvSnapLabel(data);
  const snap  = { ...data, id, label };

  // 同じ期間キーがあれば上書き、なければ先頭に追加
  const existIdx = p1CSVHistory.findIndex(s => s.id === id);
  if (existIdx >= 0) {
    p1CSVHistory[existIdx] = snap;
    activeHistoryIdx = existIdx;
  } else {
    p1CSVHistory.unshift(snap);
    activeHistoryIdx = 0;
    if (p1CSVHistory.length > 24) p1CSVHistory = p1CSVHistory.slice(0, 24);
  }

  try { localStorage.setItem(P1CSV_HISTORY_KEY, JSON.stringify(p1CSVHistory)); }
  catch(e) { console.error("p1csv save failed", e); }
}

function clearP1CSV() {
  localStorage.removeItem(P1CSV_HISTORY_KEY);
  p1CSVHistory = [];
  activeHistoryIdx = 0;
  activeMediaTab = "全体";
  updateDropBtnState();
  redraw();
  showToast("全データをクリアしました");
}

// 特定スナップショットを削除
function deleteHistorySnapshot(idx) {
  p1CSVHistory.splice(idx, 1);
  activeHistoryIdx = Math.min(activeHistoryIdx, Math.max(0, p1CSVHistory.length - 1));
  try { localStorage.setItem(P1CSV_HISTORY_KEY, JSON.stringify(p1CSVHistory)); }
  catch(e) {}
  updateDropBtnState();
  redraw();
}

// スナップショット切り替え
function selectHistorySnapshot(idx) {
  activeHistoryIdx = idx;
  redraw();
}

// ── CSV Parser ───────────────────────────────────────────────
// マルチラインセル（引用符内改行）に対応した全文パーサー
function parseCSVMultiline(text) {
  const rows = [];
  let curRow = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], nx = text[i + 1];
    if (ch === '"') {
      if (inQ && nx === '"') { field += '"'; i++; } // エスケープ ""
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      curRow.push(field.trim()); field = "";
    } else if ((ch === '\r' || ch === '\n') && !inQ) {
      if (ch === '\r' && nx === '\n') i++; // CRLF
      curRow.push(field.trim()); field = "";
      rows.push(curRow);
      curRow = [];
    } else {
      field += ch;
    }
  }
  if (field || curRow.length) { curRow.push(field.trim()); rows.push(curRow); }
  return rows;
}

function parseNumVal(s) {
  if (s === null || s === undefined || s === "") return null;
  const str = String(s).trim();
  if (str === "#DIV/0!" || str === "#N/A" || str === "#REF!") return null;
  const n = parseFloat(str.replace(/[,，%％円\s¥¥￥]/g, ""));
  return isNaN(n) ? null : n;
}

function parseFormCSV(text) {
  // BOM除去 & マルチライン対応パース
  const rows = parseCSVMultiline(text.replace(/^\uFEFF/, ""));
  if (rows.length < 5) throw new Error("行数が少なすぎます");

  // 週ラベルを探す（例: "3/2~3/8" や "3/2〜3/8"）
  let weekLabels = [];
  for (let i = 0; i < Math.min(10, rows.length); i++) {
    const found = rows[i].filter(c => /\d+\/\d+[~〜]\d+\/\d+/.test(c));
    if (found.length >= 2) { weekLabels = found.slice(0, 4); break; }
  }

  // コンテンツベースのセクション開始行を検出
  const sectionStarts = {};
  rows.forEach((row, i) => {
    const c0 = (row[0] || "").replace(/[\r\n]/g, "").trim();
    for (const name of MEDIA_SECTION_NAMES) {
      if (!(name in sectionStarts) && SECTION_HEADER_RE[name].test(c0)) {
        sectionStarts[name] = i;
      }
    }
  });

  // 各セクションの行を抽出してパース
  const sections = {};
  MEDIA_SECTION_NAMES.forEach((name, idx) => {
    const start = sectionStarts[name];
    if (start === undefined) return;
    const nextName = MEDIA_SECTION_NAMES.slice(idx + 1).find(n => n in sectionStarts);
    const end = nextName ? sectionStarts[nextName] : rows.length;
    sections[name] = parseSectionRows(rows.slice(start, end));
  });

  // 月推定（週ラベルの月数字から）
  let month = curMonth;
  if (weekLabels.length) {
    const m = weekLabels[0].match(/^(\d{1,2})\//);
    if (m) {
      const mo = parseInt(m[1]);
      const y  = parseInt(curMonth.split("-")[0]) || new Date().getFullYear();
      month = `${y}-${String(mo).padStart(2,"0")}`;
    }
  }

  return { uploadedAt: new Date().toISOString(), weekLabels, month, sections };
}

function parseSectionRows(rows) {
  // 実際のCSV構造:
  //   リスト送付\n弊社ボール | 実績/KPI/達成率 | w1..w4 | 合計
  //   対応数/送付完了数/送付完了率 | 実績/KPI/達成率 | ...
  //   転換率 | アポ数  | ...  ← アポ数の実績
  //          | 転換率  | ...  ← 転換率の実績
  //          | 達成率  | ...  ← 転換率の達成率
  //   費用   | 消化費用 | ...  (無視)
  //          | SAKURA  | ...  (無視)
  //          | 合計    | ...  ← 費用合計の実績
  //          | 商談獲得単価 | ... ← 商談獲得単価の実績
  const out = {};
  let curName = null;   // 直前のメトリクス表示名
  let inCost  = false;  // 費用ブロック中フラグ
  let inConv  = false;  // 転換率ブロック中フラグ

  const vals = row => [2,3,4,5,6].map(i => parseNumVal(row[i]));
  const set  = (name, key, row) => {
    if (!out[name]) out[name] = {};
    out[name][key] = vals(row);
  };

  rows.forEach(row => {
    if (!row || row.length < 2) return;
    const c0 = (row[0] || "").replace(/[\r\n]/g, "").trim();
    const c1 = (row[1] || "").trim();

    if (c0 !== "") {
      // ── ブロック先頭（c0が非空）──
      inCost = false; inConv = false;

      if (c0.includes("リスト送付") || c0.includes("弊社ボール")) {
        curName = "リスト送付数";
      } else if (c0 === "対応数" || c0 === "送付完了数" || c0 === "送付完了率") {
        curName = c0;
      } else if (c0 === "転換率") {
        inConv = true; curName = null;
        if (c1 === "アポ数") {
          set("アポ数", "a", row); // アポ数は実績値のみ
        }
        return; // ブロック先頭の転換率行はここで終了
      } else if (c0 === "費用") {
        inCost = true; curName = null;
        return;
      } else {
        curName = null; // 未知（ヘッダー行など）
      }
    } else {
      // ── 継続行（c0が空）──
      if (inCost) {
        if (c1 === "合計")        set("費用合計",    "a", row);
        if (c1 === "商談獲得単価") set("商談獲得単価","a", row);
        return;
      }
      if (inConv) {
        if (c1 === "転換率") set("転換率", "a", row);
        if (c1 === "達成率") set("転換率", "r", row);
        return;
      }
    }

    // ── 通常メトリクスの 実績/KPI/達成率 行 ──
    if (!curName) return;
    const key = c1 === "実績" ? "a" : c1.toUpperCase() === "KPI" ? "k" : c1 === "達成率" ? "r" : null;
    if (!key) return;
    set(curName, key, row);
  });

  return out;
}

// ── DropZone ─────────────────────────────────────────────────
function setupDropZone() {
  const btn   = document.getElementById("csv-drop-btn");
  const input = document.getElementById("csv-file-input");
  if (!btn || !input) return;

  input.addEventListener("change", e => {
    const f = e.target.files?.[0];
    if (f) handleCSVFile(f);
    input.value = "";
  });

  // ドキュメント全体でドラッグ検知
  document.addEventListener("dragover", e => {
    e.preventDefault();
    if (e.dataTransfer?.items?.length) btn.classList.add("over");
  });
  document.addEventListener("dragleave", e => {
    if (!e.relatedTarget || !document.body.contains(e.relatedTarget))
      btn.classList.remove("over");
  });
  document.addEventListener("drop", e => {
    e.preventDefault();
    btn.classList.remove("over");
    const f = Array.from(e.dataTransfer?.files || []).find(f => f.name.endsWith(".csv"));
    if (f) handleCSVFile(f);
  });
}

function handleCSVFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = parseFormCSV(ev.target.result);
      // 少なくとも1セクションにデータがあるか確認
      const hasData = Object.values(data.sections).some(s => Object.keys(s).length > 0);
      if (!hasData) throw new Error("指標データが見つかりません（列構造を確認してください）");
      saveP1CSV(data);
      updateDropBtnState();
      redraw();
      showToast("CSVを読み込みました");
    } catch(e) {
      console.error("CSV parse error:", e);
      showToast("CSVの形式が正しくありません: " + e.message, true);
    }
  };
  reader.onerror = () => showToast("ファイルの読み込みに失敗しました", true);
  reader.readAsText(file, "UTF-8");
}

function updateDropBtnState() {
  const btn = document.getElementById("csv-drop-btn");
  if (!btn) return;
  const csv = getActiveCSV();
  if (csv) {
    btn.classList.add("has-data");
    const d = new Date(csv.uploadedAt).toLocaleString("ja-JP",
      { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
    btn.title = `CSV読込済み (${p1CSVHistory.length}件 / 最新:${d})`;
  } else {
    btn.classList.remove("has-data");
    btn.title = "CSVをドロップまたはクリックで選択";
  }
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg, isErr = false) {
  let t = document.getElementById("ra-toast");
  if (!t) { t = document.createElement("div"); t.id = "ra-toast"; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = "toast" + (isErr ? " err" : "");
  t.offsetHeight; // force reflow
  t.classList.add("show");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove("show"), 3000);
}

// ── Media Section Renderer ────────────────────────────────────
/**
 * Pipeline① セクション内の媒体別タブUIを生成する
 * @param {number|null} weekNum  週次ビュー時は週番号、月次ビュー時は null
 */
function renderMediaSection(weekNum) {
  if (p1CSVHistory.length === 0) return "";

  const csv = getActiveCSV();
  if (!csv) return "";

  // ── スナップショット履歴バー ──────────────────────────────
  const histBar = p1CSVHistory.length > 1 ? `
    <div class="mhist-bar">
      <span class="mhist-label">履歴</span>
      ${p1CSVHistory.map((s, i) => `
        <div class="mhist-pill${i === activeHistoryIdx ? " active" : ""}">
          <span onclick="selectHistorySnapshot(${i})">${s.label}</span>
          <button class="mhist-del" onclick="deleteHistorySnapshot(${i})" title="削除">×</button>
        </div>
      `).join("")}
    </div>
  ` : "";

  // ── 媒体タブ ─────────────────────────────────────────────
  const sectionNames = MEDIA_SECTION_NAMES;
  const tabs = sectionNames.map(name =>
    `<button class="mtab-btn${activeMediaTab === name ? " active" : ""}"
      onclick="setMediaTab('${name}')">${name}</button>`
  ).join("");

  const section  = csv.sections?.[activeMediaTab] || {};
  const wLabels  = csv.weekLabels?.slice(0, 4) || ["第1週","第2週","第3週","第4週"];
  const uploadDt = new Date(csv.uploadedAt).toLocaleString("ja-JP",
    { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });

  // 週次ビューの場合、対象週のカラムをハイライト（週番号→index）
  const hiliteIdx = weekNum != null ? weekNum - 1 : -1;

  // ── テーブルヘッダー列 ──────────────────────────────────────
  const thCols = wLabels.map((l, i) =>
    `<th style="${i === hiliteIdx ? "color:var(--blue2)" : ""}">${l}</th>`
  ).join("") + "<th>合計</th>";

  // ── KPI付き指標の行 ────────────────────────────────────────
  function kpiCell(a, k, isHi) {
    if (a === null && k === null) return `<td style="color:var(--t3)">—</td>`;
    const r   = (a !== null && k) ? a / k * 100 : null;
    const c   = color(r);
    const w   = r !== null ? Math.min(100, r) : 0;
    const hi  = isHi ? "background:rgba(59,130,246,0.07);" : "";
    return `<td style="${hi}">
      <span class="mv">${a !== null ? fmtN(a) : "—"}</span>
      ${k !== null ? `<span class="mk">KPI ${fmtN(k)}</span>` : ""}
      ${r !== null ? `<span class="mr c-${c}">${emoji(r)} ${fmtPct(r)}</span>
        <div class="mbar"><div class="mbar-f fill-${c}" style="width:${w}%"></div></div>` : ""}
    </td>`;
  }

  const rows1 = CSV_METRICS_KPI.map(name => {
    const d = section[name] || {};
    const cells = wLabels.map((_, i) =>
      kpiCell(d.a?.[i] ?? null, d.k?.[i] ?? null, i === hiliteIdx)
    ).join("");
    return `<tr><td>${name}</td>${cells}${kpiCell(d.a?.[4]??null, d.k?.[4]??null, false)}</tr>`;
  }).join("");

  // ── KPIなし指標の行 ────────────────────────────────────────
  function plainCell(v, isCur, isHi) {
    const hi = isHi ? "background:rgba(59,130,246,0.07);" : "";
    if (v === null) return `<td style="${hi}color:var(--t3)">—</td>`;
    const disp = isCur ? "¥" + fmtN(v) : fmtN(v);
    return `<td style="${hi}"><span class="mv">${disp}</span></td>`;
  }

  const rows2 = CSV_METRICS_PLAIN.map(name => {
    const d     = section[name] || {};
    const isCur = name.includes("費用") || name.includes("単価");
    const cells = wLabels.map((_, i) =>
      plainCell(d.a?.[i]??null, isCur, i === hiliteIdx)
    ).join("");
    return `<tr><td>${name}</td>${cells}${plainCell(d.a?.[4]??null, isCur, false)}</tr>`;
  }).join("");

  return `
    <div class="media-heading">

async function loadAppData() {
  try {
    const rawUrl = "https://raw.githubusercontent.com/ra-admin-ship-it/ra-kpi-dashboard2/main/applications_data.json?_=" + Date.now();
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const d = await res.json();
    console.info("[applications_data.json] loaded:", d.snapshots?.length, "snapshots");
    return d;
  } catch(e) {
    console.info("[applications_data.json] not available:", e.message);
    return null;
  }
}

function selectAppSnap(idx) {
  activeSnapIdx = idx;
  renderApplications();
}

function renderApplications() {
  const el = document.getElementById("panel-applications");
  if (!el) return;
  charts.forEach(c => c.destroy());
  charts = [];

  if (!APP_DATA || !APP_DATA.snapshots || APP_DATA.snapshots.length === 0) {
    el.innerHTML = `
      <div class="sec">
        <div class="sec-body" style="text-align:center;padding:48px 22px">
          <div style="font-size:15px;color:var(--t2);margin-bottom:10px">📊 データが未取得です</div>
          <div style="font-size:12px;color:var(--t3);line-height:1.8">
            以下のコマンドを実行してデータを取得してください：<br>
            <code style="display:inline-block;margin-top:6px;background:rgba(0,0,0,0.4);padding:6px 14px;border-radius:6px;font-family:monospace;color:var(--blue2)">python update_applications.py</code>
          </div>
        </div>
      </div>`;
    return;
  }

  const snaps = APP_DATA.snapshots;
  const idx = (activeSnapIdx !== null && activeSnapIdx >= 0 && activeSnapIdx < snaps.length)
    ? activeSnapIdx : snaps.length - 1;
  const current = snaps[idx];

  el.innerHTML =
    _appHeader(current, snaps, idx) +
    _appSection1(current, snaps) +
    _appSection2(current, snaps) +
    _appSection3(current) +
    _appSection4(snaps);

  setTimeout(() => _drawAppCharts(current, snaps), 0);
}

function _appHeader(snap, snaps, activeIdx) {
  const dt = snap.fetchedAt
    ? new Date(snap.fetchedAt).toLocaleString("ja-JP", {
        timeZone:"Asia/Tokyo", year:"numeric", month:"2-digit",
        day:"2-digit", hour:"2-digit", minute:"2-digit"
      })
    : "—";
  const isLatest = activeIdx === snaps.length - 1;

  // スナップショット選択ピル（常に表示）
  const snapBar = `
    <div class="app-snap-bar">
      <span class="app-snap-lbl">取得履歴</span>
      <div class="app-snap-pills">
        ${[...snaps].reverse().map((s, ri) => {
          const origIdx = snaps.length - 1 - ri;
          const label = s.weekLabel ?? (s.fetchedAt||"").slice(0,10);
          return `<button class="app-snap-pill${origIdx === activeIdx ? ' active' : ''}"
            onclick="selectAppSnap(${origIdx})">${label}</button>`;
        }).join('')}
        ${snaps.length === 1 ? `<span style="font-size:10px;color:var(--t3);align-self:center">毎週月曜に自動追加されます</span>` : ''}
      </div>

      <span style="font-size:11px;color:var(--t3)">取得日時: ${dt}</span>
      <span style="font-size:11px;color:var(--t3)">|</span>
      <span style="font-size:11px;color:var(--t3)">今週基準日: ${snap.weekLabel ?? "—"}</span>
      ${!isLatest ? `<span class="app-hist-badge">過去データ表示中</span>` : ''}
    </div>
    ${snapBar}
  </div>`;
}

function _growthChip(s) {
  if (!s || s === "-" || s === "") return `<span style="color:var(--t3)">—</span>`;
  const v = parseFloat(s.replace("%",""));
  if (isNaN(v)) return `<span style="color:var(--t3)">${s}</span>`;
  const cls = v > 100 ? "app-chip-up" : v < 100 ? "app-chip-down" : "app-chip-flat";
  const icon = v > 100 ? "▲" : v < 100 ? "▼" : "→";
  return `<span class="app-chip ${cls}">${icon} ${s}</span>`;
}

function _trendArrow(cur, prev) {
  if (cur === 0 && prev === 0) return `<span style="color:var(--t3)">—</span>`;
  if (prev === 0) return `<span style="color:var(--green);font-size:11px">▲ NEW</span>`;
  const r = cur / prev * 100;
  if (r >= 110) return `<span style="color:var(--green);font-size:11px">▲ ${r.toFixed(0)}%</span>`;
  if (r >= 90)  return `<span style="color:var(--t2);font-size:11px">→ ${r.toFixed(0)}%</span>`;
  return `<span style="color:var(--red2);font-size:11px">▼ ${r.toFixed(0)}%</span>`;
}

function _coSortVal(c, key) {
  const ratio = (cur, prev) => prev > 0 ? cur / prev : (cur > 0 ? 999 : 0);
  switch (key) {
    case "weeklyThis":  return c.weeklyThis;
    case "weeklyLast":  return c.weeklyLast;
    case "weeklyPrev":  return c.weeklyPrev;
    case "weeklyRatio": return ratio(c.weeklyThis, c.weeklyLast);
    case "monthlyThis": return c.monthlyThis;
    case "monthlyLast": return c.monthlyLast;
    case "monthlyPrev": return c.monthlyPrev;
    case "monthlyRatio":return ratio(c.monthlyThis, c.monthlyLast);
    case "name":        return (c.name || "").toLowerCase();
    default:            return c.monthlyThis;
  }
}

                <th class="sort-th${appSortKey==='monthlyThis'?' srt-active':''}" onclick="sortAppBy('monthlyThis')">
                  今月<span class="sort-ic">${appSortKey==='monthlyThis'?(appSortDir==='asc'?'▲':'▼'):'⇅'}</span>
                </th>
                <th class="sort-th${appSortKey==='monthlyLast'?' srt-active':''}" onclick="sortAppBy('monthlyLast')">
                  先月<span class="sort-ic">${appSortKey==='monthlyLast'?(appSortDir==='asc'?'▲':'▼'):'⇅'}</span>
                </th>
                <th class="sort-th${appSortKey==='monthlyPrev'?' srt-active':''}" onclick="sortAppBy('monthlyPrev')">
                  先々月<span class="sort-ic">${appSortKey==='monthlyPrev'?(appSortDir==='asc'?'▲':'▼'):'⇅'}</span>
                </th>
                <th class="sort-th${appSortKey==='monthlyRatio'?' srt-active':''}" onclick="sortAppBy('monthlyRatio')">
                  月次推移<span class="sort-ic">${appSortKey==='monthlyRatio'?(appSortDir==='asc'?'▲':'▼'):'⇅'}</span>
                </th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        ${toggleBtn}
      </div>
    </div>`;
}

function toggleAppCompanies() {
  appShowAllCompanies = !appShowAllCompanies;
  renderApplications();
}

function sortAppBy(key) {
  if (appSortKey === key) {
    appSortDir = appSortDir === "desc" ? "asc" : "desc";
  } else {
    appSortKey = key;
    appSortDir = "desc"; // 新しい列は降順から開始
  }
  renderApplications();
}

// ─── Chart.js 描画 ───────────────────────────────────────────────
function _drawAppCharts(latest, snaps) {
  const db = latest.db   || {};
  const sp = latest.split || {};

  const C_CIRCUS   = "#3B82F6";
  const C_CA       = "#8B5CF6";
  const C_JOBINS   = "#10B981";
  const C_ALLIANCE = "#3B82F6";
  const C_OWN      = "#10B981";

  const baseOpts = (stacked=true) => ({
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position:"bottom", labels:{ boxWidth:10, font:{size:11} } },
    },
    scales: stacked ? {
      x: { stacked:true, grid:{ color:"rgba(255,255,255,0.05)" } },
      y: { stacked:true, grid:{ color:"rgba(255,255,255,0.05)" }, ticks:{ maxTicksLimit:6 } },
    } : {
      x: { grid:{ color:"rgba(255,255,255,0.05)" } },
      y: { grid:{ color:"rgba(255,255,255,0.05)" }, ticks:{ maxTicksLimit:6 } },
    },
  });

  function mkChart(id, cfg) {
    const el = document.getElementById(id);
    if (!el) return;
    charts.push(new Chart(el, cfg));
  }

  // ① DB 週次 stacked bar
  const wt=db.weekly?.thisWeek||{}, wl=db.weekly?.lastWeek||{}, wp=db.weekly?.twoWeeksAgo||{};
  mkChart("chart-db-weekly", {
    type:"bar",
    data:{
      labels:["今週","先週","先々週"],
      datasets:[
        { label:"CIRCUS",     data:[wt.circus??0,wl.circus??0,wp.circus??0],     backgroundColor:C_CIRCUS },
        { label:"CrowdAgent", data:[wt.crowdAgent??0,wl.crowdAgent??0,wp.crowdAgent??0], backgroundColor:C_CA },
        { label:"JoBins",     data:[wt.jobins??0,wl.jobins??0,wp.jobins??0],     backgroundColor:C_JOBINS },
      ],
    },
    options:baseOpts(true),
  });

  // ① DB 月次 stacked bar
  const mt=db.monthly?.thisMonth||{}, ml=db.monthly?.lastMonth||{}, mp=db.monthly?.twoMonthsAgo||{};
  mkChart("chart-db-monthly", {
    type:"bar",
    data:{
      labels:["今月","先月","先々月"],
      datasets:[
        { label:"CIRCUS",     data:[mt.circus??0,ml.circus??0,mp.circus??0],     backgroundColor:C_CIRCUS },
        { label:"CrowdAgent", data:[mt.crowdAgent??0,ml.crowdAgent??0,mp.crowdAgent??0], backgroundColor:C_CA },
        { label:"JoBins",     data:[mt.jobins??0,ml.jobins??0,mp.jobins??0],     backgroundColor:C_JOBINS },
      ],
    },
    options:baseOpts(true),
  });

  // ① DB 履歴 (snaps > 2)
  if (snaps.length > 2) {
    mkChart("chart-db-history", {
      type:"bar",
      data:{
        labels: snaps.map(s => s.weekLabel ?? (s.fetchedAt||"").slice(0,10)),
        datasets:[
          { label:"CIRCUS",     data:snaps.map(s=>s.db?.weekly?.thisWeek?.circus??0),     backgroundColor:C_CIRCUS },
          { label:"CrowdAgent", data:snaps.map(s=>s.db?.weekly?.thisWeek?.crowdAgent??0), backgroundColor:C_CA },
          { label:"JoBins",     data:snaps.map(s=>s.db?.weekly?.thisWeek?.jobins??0),     backgroundColor:C_JOBINS },
        ],
      },
      options:baseOpts(true),
    });
  }

  // ② Split Donut (今月)
  const smt = sp.monthly?.thisMonth || {};
  mkChart("chart-split-donut", {
    type:"doughnut",
    data:{
      labels:["アライアンス","自社"],
      datasets:[{
        data:[smt.alliance??0, smt.own??0],
        backgroundColor:[C_ALLIANCE, C_OWN],
        borderWidth:0,
      }],
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:"bottom", labels:{ boxWidth:10, font:{size:11} } } },
      cutout:"62%",
    },
  });

  // ② Split 週次 stacked bar
  const swt=sp.weekly?.thisWeek||{}, swl=sp.weekly?.lastWeek||{}, swp=sp.weekly?.twoWeeksAgo||{};
  mkChart("chart-split-weekly", {
    type:"bar",
    data:{
      labels:["今週","先週","先々週"],
      datasets:[
        { label:"アライアンス", data:[swt.alliance??0,swl.alliance??0,swp.alliance??0], backgroundColor:C_ALLIANCE },
        { label:"自社",         data:[swt.own??0,swl.own??0,swp.own??0],               backgroundColor:C_OWN },
      ],
    },
    options:baseOpts(true),
  });

  // ② Split 履歴 (snaps > 2)
  if (snaps.length > 2) {
    mkChart("chart-split-history", {
      type:"bar",
      data:{
        labels: snaps.map(s => s.weekLabel ?? (s.fetchedAt||"").slice(0,10)),
        datasets:[
          { label:"アライアンス", data:snaps.map(s=>s.split?.weekly?.thisWeek?.alliance??0), backgroundColor:C_ALLIANCE },
          { label:"自社",         data:snaps.map(s=>s.split?.weekly?.thisWeek?.own??0),      backgroundColor:C_OWN },
        ],
      },
      options:baseOpts(true),
    });
  }

  // ④ 推移チャート（snaps >= 2）
  if (snaps.length >= 2) {
    const lineOpts = {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:"bottom", labels:{ boxWidth:10, font:{size:11} } } },
      scales:{
        x:{ grid:{ color:"rgba(255,255,255,0.05)" }, ticks:{ maxTicksLimit:12 } },
        y:{ grid:{ color:"rgba(255,255,255,0.05)" }, ticks:{ maxTicksLimit:6 }, beginAtZero:true },
      },
      elements:{ point:{ radius:3, hoverRadius:5 }, line:{ tension:0.35 } },
    };

    // 週次推移
    const wLabels = snaps.map(s => s.weekLabel ?? (s.fetchedAt||"").slice(0,10));
    mkChart("chart-trend-weekly", {
      type:"line",
      data:{
        labels: wLabels,
        datasets:[
          { label:"合計",         data:snaps.map(s=>s.db?.weekly?.thisWeek?.total??0),          borderColor:"rgba(255,255,255,0.7)", backgroundColor:"rgba(255,255,255,0.05)", fill:true },
          { label:"CIRCUS",       data:snaps.map(s=>s.db?.weekly?.thisWeek?.circus??0),         borderColor:C_CIRCUS,  backgroundColor:"transparent" },
          { label:"CrowdAgent",   data:snaps.map(s=>s.db?.weekly?.thisWeek?.crowdAgent??0),     borderColor:C_CA,      backgroundColor:"transparent" },
          { label:"JoBins",       data:snaps.map(s=>s.db?.weekly?.thisWeek?.jobins??0),         borderColor:C_JOBINS,  backgroundColor:"transparent" },
          { label:"アライアンス", data:snaps.map(s=>s.split?.weekly?.thisWeek?.alliance??0),    borderColor:"#F59E0B", backgroundColor:"transparent", borderDash:[5,3] },
        ],
      },
      options: lineOpts,
    });

    // 月次推移: 同月の最後のスナップをグルーピング
    const monthMap = {};
    snaps.forEach(s => {
      const raw = (s.weekLabel ?? s.fetchedAt ?? "").replace(/\//g, "-");
      const ym  = raw.slice(0, 7);
      if (ym) monthMap[ym] = s;
    });
    const sortedYMs = Object.keys(monthMap).sort();
    if (sortedYMs.length >= 1) {
      mkChart("chart-trend-monthly", {
        type:"line",
        data:{
          labels: sortedYMs,
          datasets:[
            { label:"月合計",       data:sortedYMs.map(ym=>monthMap[ym].db?.monthly?.thisMonth?.total??0),         borderColor:"rgba(255,255,255,0.7)", backgroundColor:"rgba(255,255,255,0.05)", fill:true },
            { label:"CIRCUS",       data:sortedYMs.map(ym=>monthMap[ym].db?.monthly?.thisMonth?.circus??0),        borderColor:C_CIRCUS,  backgroundColor:"transparent" },
            { label:"CrowdAgent",   data:sortedYMs.map(ym=>monthMap[ym].db?.monthly?.thisMonth?.crowdAgent??0),    borderColor:C_CA,      backgroundColor:"transparent" },
            { label:"JoBins",       data:sortedYMs.map(ym=>monthMap[ym].db?.monthly?.thisMonth?.jobins??0),        borderColor:C_JOBINS,  backgroundColor:"transparent" },
            { label:"アライアンス", data:sortedYMs.map(ym=>monthMap[ym].split?.monthly?.thisMonth?.alliance??0),   borderColor:"#F59E0B", backgroundColor:"transparent", borderDash:[5,3] },
          ],
        },
        options: lineOpts,
      });
    }
  }
}

const LEADS_REPO = "ra-admin-ship-it/ra-kpi-dashboard2";
const LEADS_FILE = "leads_data.json";
const LEADS_PAT = atob("Z2l0aHViX3BhdF8xMUNBNUFKUUkwYmNqMnhTc1VPVWJ6X0NUV013Z3Q3dEExbWJIRWZ0bFNwUUQwSUNYQ0ZRcXdYWlhhbXJwdXU3N3g2NlhIWlg2VzJuM3J0QlRs");
const LEAD_STATUSES = [
  "商談済み・提案中","ドラフト作成中","ドラフト送付済み",
  "先方リーガルチェック中","クラウドサイン送信準備","クラウドサイン送信済み（承認待ち）",
  "書類待ち（先方から）","原本対応中","契約締結完了","再商談","見送り・保留",
  // legacy statuses from imported data
  "相手：ドラフトリーガルチェック","相手：電子契約サインバック待ち",
  "相手：原本および返送待ち","相手：その他書類送付待ち",
  "自社：契約書ドラフト作成","必要時に契約"
];
let LEADS_DATA = null;
let LEADS_SHA  = null; // GitHub file SHA for updates
let leadsFilterStatus = "all";
let leadsFilterRep    = "all";

async function loadLeadsData() {
  try {
    const url = `https://raw.githubusercontent.com/${LEADS_REPO}/main/${LEADS_FILE}?_=`+Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP "+res.status);
    LEADS_DATA = await res.json();
    // Get SHA for updates
    const pat = LEADS_PAT;
    if (pat) {
      try {
        const api = await fetch(`https://api.github.com/repos/${LEADS_REPO}/contents/${LEADS_FILE}`,
          {headers:{"Authorization":"Bearer "+pat}});
        if (api.ok) { const j=await api.json(); LEADS_SHA=j.sha; }
      } catch(e){}
    }
  } catch(e) {
    console.warn("[leads] load failed:", e.message);
    LEADS_DATA = {leads:[]};
  }
}

async function saveLeadsToGitHub() {
  LEADS_DATA.lastUpdated = new Date().toISOString();
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(LEADS_DATA, null, 2))));
  const body = {message:"update leads "+new Date().toLocaleDateString("ja-JP"),content,sha:LEADS_SHA};
  try {
    const res = await fetch(`https://api.github.com/repos/${LEADS_REPO}/contents/${LEADS_FILE}`,{
      method:"PUT",headers:{"Authorization":"Bearer "+LEADS_PAT,"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message);
    }
    const j = await res.json();
    LEADS_SHA = j.content.sha;
    showLeadsSaveOK();
    return true;
  } catch(e) { alert("保存エラー: "+e.message); return false; }
}

function showLeadsSaveOK() {
  const el = document.getElementById("leads-save-ind");
  if (el) { el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2000); }
}

function _statusClass(s) {
  if (!s) return "st-hold";
  if (s.includes("完了")) return "st-done";
  if (s.includes("見送") || s.includes("保留")) return "st-hold";
  if (s.includes("待ち") || s.includes("バック")) return "st-wait";
  return "st-progress";
}

let leadsExcludeDone = true; // デフォルト: 契約締結完了を除外

function _svcName(s) { return typeof s === "string" ? s : s?.name || ""; }
function _svcNames(svcs) { return (svcs||[]).map(s => _svcName(s)); }

function renderLeads() {
  const el = document.getElementById("panel-leads");
  if (!LEADS_DATA) { el.innerHTML = `<div class="sec"><div class="sec-body" style="text-align:center;padding:40px;color:var(--t3)">データ読み込み中...</div></div>`; return; }

  const leads = LEADS_DATA.leads || [];
  let filtered = leads;
  if (leadsExcludeDone) filtered = filtered.filter(l => l.status !== "契約締結完了");
  if (leadsFilterStatus !== "all") filtered = filtered.filter(l => l.status === leadsFilterStatus);
  if (leadsFilterRep !== "all") filtered = filtered.filter(l => l.representative === leadsFilterRep);
  filtered.sort((a,b) => (b.statusUpdatedAt||b.lastContactDate||"").localeCompare(a.statusUpdatedAt||a.lastContactDate||""));

  const statusOpts = [...new Set([...LEAD_STATUSES, ...leads.map(l=>l.status).filter(Boolean)])].filter(s=>s!=="契約締結完了"||!leadsExcludeDone);
  const repSet = [...new Set(leads.map(l=>l.representative).filter(Boolean))];

  const rows = filtered.map(l => {
    const idx = leads.indexOf(l);
    const sc = _statusClass(l.status);
    const svcs = _svcNames(l.services).map(s=>`<span class="leads-svc-tag">${s}</span>`).join("");
    return `<tr>
      <td><a class="leads-co-link" onclick="openLeadDetail(${idx})">${l.company}</a></td>
      <td class="leads-rep">${l.representative||""}</td>
      <td><div class="leads-svc">${svcs}</div></td>
      <td style="white-space:nowrap">${l.firstMeetingDate||""}</td>
      <td><select class="leads-status-sel ${sc}" onchange="editLead(${idx},'status',this.value)">
        ${statusOpts.map(s=>`<option${s===l.status?" selected":""}>${s}</option>`).join("")}
        <option value=""${!l.status?" selected":""}>(未設定)</option>
      </select></td>
      <td><input class="leads-editable leads-date" type="text" value="${l.lastContactDate||""}" placeholder="YYYY/MM/DD"
        onchange="editLead(${idx},'lastContactDate',this.value)"></td>
      <td><input class="leads-editable" type="text" value="${(l.nextAction||"").replace(/"/g,"&quot;")}"
        placeholder="" onchange="editLead(${idx},'nextAction',this.value)"></td>
      <td><input class="leads-editable" type="text" value="${(l.remarks||"").replace(/"/g,"&quot;")}"
        placeholder="" onchange="editLead(${idx},'remarks',this.value)"></td>
      <td><button class="leads-del" title="削除" onclick="deleteLead(${idx})">✕</button></td>
    </tr>`;
  }).join("");

  el.innerHTML = `
    <div class="sec">
      <div class="sec-head">
        <div class="sec-icon ic-blue">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2">
            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
          </svg>
        </div>
        <div>
          <div class="sec-title">商談後の引合管理</div>
          <div class="sec-sub">企業名クリックで詳細・商材別CRM</div>
        </div>
      </div>
      <div class="sec-body">
        <div class="leads-toolbar">
          <label class="leads-excl"><input type="checkbox" ${leadsExcludeDone?"checked":""} onchange="leadsExcludeDone=this.checked;renderLeads()">契約締結完了を除く</label>
          <select class="leads-filter" onchange="leadsFilterStatus=this.value;renderLeads()">
            <option value="all">全ステータス</option>
            ${statusOpts.map(s=>`<option value="${s}"${s===leadsFilterStatus?" selected":""}>${s}</option>`).join("")}
          </select>
          <select class="leads-filter" onchange="leadsFilterRep=this.value;renderLeads()">
            <option value="all">全担当</option>
            ${repSet.map(r=>`<option value="${r}"${r===leadsFilterRep?" selected":""}>${r}</option>`).join("")}
          </select>
          <button class="leads-btn leads-btn-primary" onclick="addLead()">＋ 新規追加</button>
          <button class="leads-btn" onclick="saveLeadsToGitHub()">💾 保存</button>
          <span class="leads-save-indicator" id="leads-save-ind">✓ 保存しました</span>
          <span class="leads-count">${filtered.length} / ${leads.length} 件</span>
        </div>
        <div class="leads-scroll">
          <table class="leads-tbl">
            <thead><tr>
              <th>企業名</th><th>担当</th><th>サービス</th><th>初回商談日</th>
              <th>ステータス</th><th>最終接点日</th><th>次のアクション</th><th>備考</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function editLead(idx, field, value) {
  if (!LEADS_DATA || !LEADS_DATA.leads[idx]) return;
  LEADS_DATA.leads[idx][field] = value;
  if (field === "status") {
    LEADS_DATA.leads[idx].statusUpdatedAt = _today();
  }
  renderLeads();
}
function _today() { return new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/-/g,"/"); }
function _esc(s) { return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

function addLead() {
  if (!LEADS_DATA) return;
  LEADS_DATA.leads.unshift({
    id: Math.random().toString(36).slice(2,10),
    company:"(新規)", representative:MEMBERS[0]||"",
    firstMeetingDate:_today(), status:"商談済み・提案中", statusUpdatedAt:_today(),
    lastContactDate:"", nextAction:"", remarks:"",
    services:[{name:"人材紹介",proposalDate:_today(),contactPerson:"",contactEmail:"",contactPhone:"",status:"",impression:"",nextAction:"",remarks:""}]
  });
  openLeadDetail(0);
}

function deleteLead(idx) {
  if (!LEADS_DATA || !LEADS_DATA.leads[idx]) return;
  if (!confirm(`「${LEADS_DATA.leads[idx].company}」を削除しますか？`)) return;
  LEADS_DATA.leads.splice(idx, 1);
  renderLeads();
}

// ── 企業詳細モーダル ────────────────────────────────────────
function openLeadDetail(idx) {
  const lead = LEADS_DATA?.leads?.[idx];
  if (!lead) return;
  document.querySelector(".ld-modal")?.remove();
  const statusOpts = [...new Set([...LEAD_STATUSES, ...LEADS_DATA.leads.map(l=>l.status).filter(Boolean)])];
  const svcTypes = LEADS_DATA.serviceTypes || ["人材紹介","AccessRPO","ヤギオファー","オートハント","求人ボックス","Note記事代行","TORERU","Wantedly運用","アポネクト"];
  const existingSvcNames = _svcNames(lead.services);

  const svcCards = (lead.services||[]).map((svc, si) => {
    const s = typeof svc === "string" ? {name:svc} : svc;
    return `<div class="ld-svc-card">
      <div class="ld-svc-card-head">
        <span class="ld-svc-card-name">${s.name}</span>
        <button class="ld-svc-card-del" onclick="removeServiceFromLead(${idx},${si})" title="この商材を削除">✕</button>
      </div>
      <div class="ld-svc-grid">
        <div class="ld-field"><span class="ld-field-lbl">提案日</span><input value="${_esc(s.proposalDate)}" onchange="editLeadSvc(${idx},${si},'proposalDate',this.value)"></div>
        <div class="ld-field"><span class="ld-field-lbl">ステータス</span>
          <select onchange="editLeadSvc(${idx},${si},'status',this.value)">
            <option value="">(未設定)</option>
            ${statusOpts.map(o=>`<option${o===s.status?" selected":""}>${o}</option>`).join("")}
          </select>
        </div>
        <div class="ld-field"><span class="ld-field-lbl">相手担当者</span><input value="${_esc(s.contactPerson)}" onchange="editLeadSvc(${idx},${si},'contactPerson',this.value)"></div>
        <div class="ld-field"><span class="ld-field-lbl">連絡先メール</span><input value="${_esc(s.contactEmail)}" onchange="editLeadSvc(${idx},${si},'contactEmail',this.value)"></div>
        <div class="ld-field"><span class="ld-field-lbl">電話番号</span><input value="${_esc(s.contactPhone)}" onchange="editLeadSvc(${idx},${si},'contactPhone',this.value)"></div>
        <div class="ld-field"><span class="ld-field-lbl">所感</span><input value="${_esc(s.impression)}" onchange="editLeadSvc(${idx},${si},'impression',this.value)"></div>
        <div class="ld-field ld-field-full"><span class="ld-field-lbl">ネクストアクション</span><input value="${_esc(s.nextAction)}" onchange="editLeadSvc(${idx},${si},'nextAction',this.value)"></div>
        <div class="ld-field ld-field-full"><span class="ld-field-lbl">備考</span><textarea onchange="editLeadSvc(${idx},${si},'remarks',this.value)">${_esc(s.remarks)}</textarea></div>
      </div>
    </div>`;
  }).join("");

  const addBtns = svcTypes.filter(t => !existingSvcNames.includes(t))
    .map(t => `<button class="ld-svc-add-btn" onclick="addServiceToLead(${idx},'${t}')">+ ${t}</button>`).join("");

  const modal = document.createElement("div");
  modal.className = "ld-modal";
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `<div class="ld-box">
    <div class="ld-header">
      <h2>${lead.company}</h2>
      <button class="ld-close" onclick="this.closest('.ld-modal').remove()">✕</button>
    </div>
    <div class="ld-info">
      <div class="ld-field"><span class="ld-field-lbl">企業名</span><input value="${_esc(lead.company)}" onchange="editLead(${idx},'company',this.value)"></div>
      <div class="ld-field"><span class="ld-field-lbl">担当</span>
        <select onchange="editLead(${idx},'representative',this.value)">
          ${MEMBERS.map(m=>`<option${m===lead.representative?" selected":""}>${m}</option>`).join("")}
        </select>
      </div>
      <div class="ld-field"><span class="ld-field-lbl">初回商談日</span><input value="${_esc(lead.firstMeetingDate)}" onchange="editLead(${idx},'firstMeetingDate',this.value)"></div>
      <div class="ld-field"><span class="ld-field-lbl">全体ステータス</span>
        <select onchange="editLead(${idx},'status',this.value)">
          ${statusOpts.map(s=>`<option${s===lead.status?" selected":""}>${s}</option>`).join("")}
          <option value=""${!lead.status?" selected":""}>(未設定)</option>
        </select>
      </div>
      <div class="ld-field"><span class="ld-field-lbl">最終接点日</span><input value="${_esc(lead.lastContactDate)}" onchange="editLead(${idx},'lastContactDate',this.value)"></div>
      <div class="ld-field"><span class="ld-field-lbl">次のアクション</span><input value="${_esc(lead.nextAction)}" onchange="editLead(${idx},'nextAction',this.value)"></div>
      <div class="ld-field ld-field-full"><span class="ld-field-lbl">備考</span><textarea onchange="editLead(${idx},'remarks',this.value)">${_esc(lead.remarks)}</textarea></div>
    </div>
    <hr class="ld-sep">
    <div class="ld-svc-header">
      <h3>商材別 提案状況</h3>
    </div>
    <div class="ld-svc-list">${svcCards || '<p style="color:var(--t3);font-size:12px;padding:0 24px">商材が追加されていません</p>'}</div>
    <div class="ld-svc-add-row">${addBtns}<button class="ld-svc-add-btn" onclick="addCustomService(${idx})">+ その他（自由入力）</button></div>
    <div class="ld-footer">
      <button class="leads-btn" onclick="this.closest('.ld-modal').remove();renderLeads()">閉じる</button>
      <button class="leads-btn leads-btn-primary" onclick="saveLeadsToGitHub().then(()=>{})">💾 保存</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function editLeadSvc(idx, svcIdx, field, value) {
  const svc = LEADS_DATA?.leads?.[idx]?.services?.[svcIdx];
  if (!svc) return;
  if (typeof svc === "string") {
    LEADS_DATA.leads[idx].services[svcIdx] = {name:svc,[field]:value};
  } else {
    svc[field] = value;
  }
}

function addServiceToLead(idx, name) {
  const lead = LEADS_DATA?.leads?.[idx];
  if (!lead) return;
  lead.services = lead.services || [];
  lead.services.push({name,proposalDate:_today(),contactPerson:"",contactEmail:"",contactPhone:"",status:"",impression:"",nextAction:"",remarks:""});
  if (!LEADS_DATA.serviceTypes?.includes(name)) {
    LEADS_DATA.serviceTypes = LEADS_DATA.serviceTypes || [];
    LEADS_DATA.serviceTypes.push(name);
  }
  openLeadDetail(idx);
}

function addCustomService(idx) {
  const name = prompt("商材名を入力してください:");
  if (!name?.trim()) return;
  addServiceToLead(idx, name.trim());
}

function removeServiceFromLead(idx, svcIdx) {
  const lead = LEADS_DATA?.leads?.[idx];
  if (!lead?.services?.[svcIdx]) return;
  const name = _svcName(lead.services[svcIdx]);
  if (!confirm(`「${name}」を削除しますか？`)) return;
  lead.services.splice(svcIdx, 1);
  openLeadDetail(idx);
}

// ═══════════════════════════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════════════════════════
Chart.defaults.font.family = "Noto Sans JP";
Chart.defaults.color = "#94A3B8";

(async function init() {
  loadP1CSV();          // localStorage から復元
  [DATA, APP_DATA] = await Promise.all([loadData(), loadAppData(), loadLeadsData()]);
  loadP1Overrides();    // 手動編集値を復元
  const months = Object.keys(DATA).sort();
  curMonth = months[months.length - 1] || curMonth;
  const md = DATA[curMonth];
  if (md) {
    const ws = Object.keys(md.weeks).map(Number).sort((a,b)=>a-b);
    curWeek = ws[ws.length - 1] || 3;
  }
  redraw();
  setupDropZone();      // ドロップゾーン設定
  updateDropBtnState(); // ボタン初期状態
})();
</script>
</body>
